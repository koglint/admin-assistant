<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8" />
    <title>Detention Tracker</title>
    <link rel="stylesheet" href="style.css" />
    <script type="module" src="detentions.js"></script>
</head>

<body>
    <h1>Detention Tracking</h1>
    <div id="auth-section">
        <button id="login-btn">Sign In with Google</button>
        <button id="logout-btn" style="display:none;">Sign Out</button>
        <p id="user-info"></p>
    </div>
    <nav class="navbar">
        <a href="index.html">Home</a>
        <a href="detentions.html">Mark Detention Roll</a>
        <a href="upload-data.html">Upload Attendance Data</a>
        <a href="late-data.html">View Late Data</a>
        <a href="reports.html">Create a Report</a>
        <a href="escalated.html">Escalate a Student</a>
        <a href="admin.html">Admin</a>
    </nav>

    <div id="content" style="display:none;">
        <section class="control-panel">
            <div class="panel-block">
                <label for="detention-search"><strong>Search Students</strong></label>
                <input type="text" id="detention-search" placeholder="Search by first name, surname, or roll class" />
            </div>
            <div class="panel-block">
                <strong>Sort Order</strong>
                <div id="sort-button-group" class="sort-button-group">
                    <button type="button" class="sort-btn active" data-sort-key="surname">Surname</button>
                    <button type="button" class="sort-btn" data-sort-key="givenName">First Name</button>
                    <button type="button" class="sort-btn" data-sort-key="rollClass">Roll Class</button>
                    <button type="button" class="sort-btn" data-sort-key="yearGroup">Year Group</button>
                </div>
            </div>
            <div class="panel-block">
                <strong>Current View</strong>
                <p id="table-stats" class="muted-text"></p>
            </div>
        </section>

        <section class="action-toolbar">
            <button id="select-all-btn">Select Visible</button>
            <button id="unselect-all-btn">Clear Selection</button>
            <button id="mark-present-btn">Mark Selected Present</button>
            <button id="mark-absent-btn" class="secondary-btn">Mark Selected Absent</button>
            <button id="toggle-resolved-btn">Hide Served</button>
            <button id="toggle-escalated-btn">Show Escalated</button>
        </section>

        <h2>Detention Roll</h2>

        <table id="detention-table">
            <thead>
                <tr>
                    <th>Select</th>
                    <th>Given Name</th>
                    <th>Surname</th>
                    <th>Roll Class</th>
                    <th>Last Late</th>
                    <th>Late Count</th>
                    <th>Detentions Served</th>
                    <th>Resolved</th>
                    <th>Undo</th>
                </tr>
            </thead>
            <tbody id="detention-body">
                <!-- Filled dynamically -->
            </tbody>
        </table>
    </div>
</body>

</html>
