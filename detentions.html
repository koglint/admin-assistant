<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8" />
    <title>Mark Detention Roll</title>
    <link rel="stylesheet" href="style.css" />
    <script type="module" src="detentions.js"></script>
</head>

<body>
    <h1>Mark Detention Roll</h1>
    <div id="auth-section">
        <button id="login-btn">Sign In with Google</button>
        <button id="logout-btn" style="display:none;">Sign Out</button>
        <p id="user-info"></p>
    </div>
    <nav class="navbar">
        <a href="index.html">Home</a>
        <a href="detentions.html">Mark Detention Roll</a>
        <a href="upload-data.html">Upload Attendance Data</a>
        <a href="late-data.html">View Late Data</a>
        <a href="reports.html">Create a Report</a>
        <a href="escalated.html">Escalate a Student</a>
        <a href="admin.html">Admin</a>
    </nav>

    <div id="content" style="display:none;">
        <section class="control-panel">
            <div class="panel-block">
                <label for="detention-search"><strong>Search Students</strong></label>
                <input type="text" id="detention-search" placeholder="Search by first name, surname, or roll class" />
            </div>
            <div class="panel-block">
                <strong>Sort Order</strong>
                <div id="sort-button-group" class="sort-button-group">
                    <button type="button" class="sort-btn" data-sort-key="surname">Surname</button>
                    <button type="button" class="sort-btn" data-sort-key="givenName">First Name</button>
                    <button type="button" class="sort-btn" data-sort-key="rollClass">Roll Class</button>
                    <button type="button" class="sort-btn active" data-sort-key="yearGroup">Year Group</button>
                </div>
                <strong>Year Filter</strong>
                <div id="year-filter-group" class="year-filter-group">
                    <button type="button" class="year-filter-btn active" data-year-filter="7">7</button>
                    <button type="button" class="year-filter-btn active" data-year-filter="8">8</button>
                    <button type="button" class="year-filter-btn active" data-year-filter="9">9</button>
                    <button type="button" class="year-filter-btn active" data-year-filter="10">10</button>
                    <button type="button" class="year-filter-btn active" data-year-filter="11">11</button>
                    <button type="button" class="year-filter-btn active" data-year-filter="12">12</button>
                    <button type="button" class="year-filter-btn active" data-year-filter="SRC">SRC</button>
                </div>
            </div>
            <div class="panel-block">
                <strong>Current View</strong>
                <p id="table-stats" class="muted-text"></p>
            </div>
        </section>

        <section class="action-toolbar">
            <div class="action-toolbar-group">
                <button id="mark-present-btn" class="mark-present-btn">Mark Selected Present</button>
                <button id="select-all-btn">Select All</button>
                <button id="unselect-all-btn">Unselect All</button>
                <button id="toggle-resolved-btn">Hide Served</button>
                <button id="toggle-escalated-btn">Show Escalated</button>
            </div>
        </section>
        <section class="table-card">
            <table id="detention-table">
                <thead>
                    <tr>
                        <th>Select</th>
                        <th>Given Name</th>
                        <th>Surname</th>
                        <th>Year</th>
                        <th>Roll Class</th>
                        <th>Last Late</th>
                        <th>Late Count</th>
                        <th>Detentions Served</th>
                        <th>Resolved</th>
                        <th>Undo</th>
                    </tr>
                </thead>
                <tbody id="detention-body">
                    <!-- Filled dynamically -->
                </tbody>
            </table>
        </section>
    </div>
</body>

</html>
