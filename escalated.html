<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8" />
    <title>Escalated Students</title>
    <link rel="stylesheet" href="style.css" />
    <script type="module" src="escalated.js" defer></script>
</head>

<body style="display: none;">
    <h1>Escalated Students</h1>

    <div id="auth-section">
        <button id="login-btn">Sign In with Google</button>
        <button id="logout-btn" style="display:none;">Sign Out</button>
        <p id="user-info"></p>
    </div>

    <nav class="navbar">
        <a href="index.html">Home</a>
        <a href="detentions.html">Mark Detention Roll</a>
        <a href="late-data.html#upload-section">Upload Attendance Data</a>
        <a href="late-data.html">View Late Data</a>
        <a href="reports.html">Create a Report</a>
        <a href="escalated.html">Escalate a Student</a>
        <a href="admin.html">Admin</a>
    </nav>

    <section class="control-panel">
        <div class="panel-block">
            <h2>Manually Escalate Student</h2>
            <input type="text" id="search-input" placeholder="Search by name or roll class" />
            <ul id="search-results"></ul>
        </div>
    </section>

    <h2>Currently Escalated</h2>
    <table>
        <thead>
            <tr>
                <th>Name</th>
                <th>Roll Class</th>
                <th>Late Count</th>
                <th>Reasons</th>
                <th>Detention Status</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="escalated-body">
            <!-- Filled by JS -->
        </tbody>
    </table>
</body>

</html>
