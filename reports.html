<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Reports</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jspdf-autotable@3.5.28/dist/jspdf.plugin.autotable.min.js"></script>
    <script type="module" src="reports.js"></script>
</head>

<body>
    <h1>Reports Export</h1>
    <div id="auth-section">
        <button id="login-btn">Sign In with Google</button>
        <button id="logout-btn" style="display:none;">Sign Out</button>
        <p id="user-info"></p>
    </div>
    <nav class="navbar">
        <a href="index.html">Home</a>
        <a href="detentions.html">Detentions</a>
        <a href="reports.html">Reports</a>
        <a href="escalated.html">Escalated Students</a>
        <a href="admin.html">Admin</a>
    </nav>

    <div id="content" style="display:none;">
        <section class="control-panel">
            <div class="panel-block">
                <label for="export-format"><strong>Export Format</strong></label>
                <select id="export-format">
                    <option value="pdf">PDF</option>
                    <option value="excel">Excel</option>
                </select>
            </div>
        </section>

        <section class="admin-card">
            <h2>Whole School Summary</h2>
            <p class="admin-note">Export a school-wide lateness summary for current records.</p>
            <button id="generate-summary-report">Generate Summary Report</button>
        </section>

        <section class="admin-card">
            <h2>Student History Report</h2>
            <div class="control-panel">
                <div class="panel-block">
                    <label for="history-scope"><strong>Selection Type</strong></label>
                    <select id="history-scope">
                        <option value="single">Single Student</option>
                        <option value="manual">Selected Students</option>
                        <option value="rollClass">Roll Class</option>
                        <option value="yearGroup">Year Group</option>
                    </select>
                </div>
                <div class="panel-block">
                    <label for="student-search"><strong>Search Students</strong></label>
                    <input type="text" id="student-search" placeholder="Search by name or roll class" />
                </div>
                <div class="panel-block">
                    <label for="roll-class-select"><strong>Roll Class</strong></label>
                    <select id="roll-class-select"></select>
                </div>
                <div class="panel-block">
                    <label for="year-group-select"><strong>Year Group</strong></label>
                    <select id="year-group-select"></select>
                </div>
            </div>

            <div class="admin-card">
                <strong>Students</strong>
                <div id="student-picker" class="student-picker"></div>
            </div>

            <button id="generate-history-report">Generate Student History Report</button>
        </section>
    </div>
</body>

</html>
